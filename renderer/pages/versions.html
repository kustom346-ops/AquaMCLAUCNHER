<div class="page">
    <h1 class="page-title">Версии</h1>
    <p class="page-subtitle">Выберите версию Minecraft</p>
    
    <div class="versions-filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="release">Релиз</button>
        <button class="filter-btn" data-filter="snapshot">Снапшот</button>
        <button class="filter-btn" data-filter="beta">Бета</button>
    </div>
    
    <div class="versions-table" id="versionsTable">Загрузка...</div>
</div>

<style>
.version-row {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    transition: all 0.3s ease;
    gap: 14px;
    border-radius: 8px;
    margin-bottom: 4px;
}
.version-row:hover {
    background: color-mix(in srgb, var(--accent) 6%, transparent);
    transform: translateX(4px);
}
.version-row.selected {
    background: rgba(34, 197, 94, 0.08) !important;
    border-left: 3px solid #4ade80 !important;
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
}
.version-row.removing {
    animation: removeSlide 0.5s ease forwards;
}
@keyframes removeSlide {
    0% { opacity: 1; transform: translateX(0); }
    100% { opacity: 0; transform: translateX(80px); filter: blur(6px); }
}

.select-btn {
    padding: 10px 22px;
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent-light);
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    outline: none;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    margin-left: auto;
}
.select-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(34, 197, 94, 0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}
.select-btn:hover {
    background: rgba(34, 197, 94, 0.2);
    border-color: #4ade80;
    color: #4ade80;
    box-shadow: 0 0 25px rgba(34, 197, 94, 0.4), inset 0 0 20px rgba(34, 197, 94, 0.1);
    transform: translateY(-2px);
    letter-spacing: 1px;
}
.select-btn:hover::before {
    width: 300px;
    height: 300px;
}
.select-btn:active {
    transform: scale(0.94);
    transition: 0.1s;
    background: #4ade80;
    color: #000;
    border-color: #4ade80;
}

.delete-btn {
    padding: 10px 14px;
    border: 1.5px solid rgba(239, 68, 68, 0.25);
    border-radius: 10px;
    background: transparent;
    color: rgba(248, 113, 113, 0.6);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s ease;
    outline: none;
}
.delete-btn:hover {
    background: rgba(239, 68, 68, 0.12);
    border-color: #f87171;
    color: #f87171;
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.25);
    transform: translateY(-2px) rotate(5deg);
}
.delete-btn:active {
    transform: scale(0.9);
    transition: 0.1s;
}
</style>

<script>
window.electronAPI.getVersions().then(function(versions) {
    var table = document.getElementById('versionsTable');
    var filters = document.querySelectorAll('.filter-btn');
    
    if (!versions || versions.length === 0) {
        table.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:15px;"><i class="fa-solid fa-box-open" style="font-size:36px;opacity:0.2;display:block;margin-bottom:10px;"></i>Нет установленных версий</div>';
        return;
    }

    function render(filter) {
        var filtered = filter === 'all' ? versions : versions.filter(function(v) { return v.type === filter; });
        
        if (filtered.length === 0) {
            table.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Нет версий в этой категории</div>';
            return;
        }

        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var v = filtered[i];
            html += '<div class="version-row" data-version="' + v.id + '">';
            html += '<span class="version-row-type type-' + v.type + '">' + v.type + '</span>';
            html += '<span class="version-row-name">' + v.name + '</span>';
            html += '<span class="version-row-date">' + v.date + '</span>';
            html += '<span class="version-row-size">' + v.size + '</span>';
            html += '<button class="delete-btn"><i class="fa-solid fa-trash"></i></button>';
            html += '<button class="select-btn"><i class="fa-solid fa-check" style="margin-right:6px;"></i>Выбрать</button>';
            html += '</div>';
        }
        
        table.innerHTML = html;

        var rows = table.querySelectorAll('.version-row');
        for (var j = 0; j < rows.length; j++) {
            (function(row, versionId) {
                row.querySelector('.select-btn').onclick = function(e) {
                    e.stopPropagation();
                    table.querySelectorAll('.version-row').forEach(function(r) { r.classList.remove('selected'); });
                    row.classList.add('selected');
                    var span = document.querySelector('.selected-version span');
                    if (span) span.textContent = versionId;
                };

                row.querySelector('.delete-btn').onclick = function(e) {
                    e.stopPropagation();
                    row.classList.add('removing');
                    setTimeout(function() { row.classList.remove('removing'); }, 600);
                };
            })(rows[j], filtered[j].id);
        }
    }

    filters.forEach(function(btn) {
        btn.onclick = function() {
            filters.forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            render(btn.dataset.filter);
        };
    });

    render('all');
}).catch(function(e) {
    document.getElementById('versionsTable').innerHTML = '<div style="text-align:center;padding:40px;color:#f87171;">Ошибка загрузки</div>';
});
</script>
